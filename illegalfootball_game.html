<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚽ illegalfootball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080810;
  --surface: #0d0d1a;
  --card: #111120;
  --card2: #16162a;
  --border: #1e1e35;
  --border2: #28284a;
  --text: #d8d8f0;
  --sub: #7070a0;
  --muted: #3a3a5a;
  --red: #e8304a;
  --red2: #c0233b;
  --gold: #f0a020;
  --green: #22c45e;
  --blue: #3a8eff;
  --purple: #9b59b6;
  --mono: 'Space Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}
html { background: var(--bg); color: var(--text); font-family: var(--body); font-size: 14px; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
#root { width: 100%; max-width: 460px; min-height: 100vh; display: flex; flex-direction: column; position: relative; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── BUTTONS ── */
button { cursor: pointer; border: none; font-family: var(--cond); font-weight: 700; letter-spacing: 0.05em; border-radius: 8px; transition: all 0.15s; }
button:active { transform: scale(0.97); opacity: 0.9; }
button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn { display: block; width: 100%; padding: 14px; font-size: 16px; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover:not(:disabled) { background: #f04060; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover:not(:disabled) { background: #ffc030; }
.btn-ghost { background: transparent; color: var(--sub); border: 1px solid var(--border2); }
.btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--border2); background: var(--card2); }
.btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text); }
.btn-outline:hover:not(:disabled) { border-color: var(--sub); }
.btn-sm { padding: 8px 14px; font-size: 13px; width: auto; }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
.card2 { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }

/* ── TOP BAR ── */
#topbar {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 200;
  gap: 10px;
}
#topbar.visible { display: flex; }
.tb-left { display: flex; flex-direction: column; min-width: 0; }
.tb-day { font-family: var(--mono); font-size: 9px; color: var(--sub); letter-spacing: 0.12em; text-transform: uppercase; }
.tb-phase { font-family: var(--cond); font-size: 16px; font-weight: 800; color: #fff; line-height: 1; }
.tb-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.tb-coins { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--gold); }
.tb-transp { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.tb-transp-label { font-family: var(--mono); font-size: 9px; color: var(--sub); letter-spacing: 0.08em; }
.tb-bar { width: 60px; height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.tb-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; background: var(--green); }

/* ── PAGE ── */
.page { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; }

/* ── HOME SCREEN ── */
#screen-home .hero {
  padding: 60px 0 40px;
  text-align: center;
}
.logo {
  font-family: var(--cond);
  font-size: 56px;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1;
  color: #fff;
  margin-bottom: 6px;
}
.logo span { color: var(--red); }
.logo-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 40px; }
.score-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
.score-row:last-child { border-bottom: none; }
.score-num { font-family: var(--mono); color: var(--gold); font-weight: 700; }
.score-rank { font-family: var(--cond); font-size: 14px; font-weight: 800; }
.no-scores { text-align: center; padding: 20px; font-size: 13px; color: var(--muted); }

/* ── SETUP SCREEN ── */
#screen-setup { }
.setup-hero { padding: 32px 0 24px; text-align: center; }
.name-input {
  width: 100%; background: var(--card2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 14px 16px; color: #fff;
  font-size: 18px; font-weight: 600; font-family: var(--body);
  margin-bottom: 14px; outline: none;
}
.name-input:focus { border-color: var(--gold); }
.name-input::placeholder { color: var(--muted); }
.diff-btn {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 0.2s, background 0.2s; margin-bottom: 8px; width: 100%;
}
.diff-btn:hover { border-color: var(--border2); }
.diff-btn.sel { border-color: var(--red); background: #1a0810; }
.diff-icon { font-size: 22px; }
.diff-info { text-align: left; }
.diff-name { font-family: var(--cond); font-size: 16px; font-weight: 800; color: #fff; }
.diff-desc { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* ── SECTION HELPERS ── */
.sec-title { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
.ph-title { font-family: var(--cond); font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 0.02em; }
.ph-sub { font-size: 12px; color: var(--sub); margin-bottom: 14px; margin-top: 2px; }
.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* ── MATCH CARD ── */
.match-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 10px;
}
.match-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.team-block { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
.team-block.home { align-items: flex-start; }
.team-block.away { align-items: flex-end; }
.t-icon { font-size: 26px; }
.t-name { font-family: var(--cond); font-size: 16px; font-weight: 800; color: #fff; }
.t-rating { font-family: var(--mono); font-size: 10px; color: var(--sub); }
.vs-sep { font-family: var(--mono); font-size: 11px; color: var(--muted); padding: 0 10px; }
.match-intel { margin-top: 8px; }
.intel-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.intel-row:last-child { border-bottom: none; }
.intel-lbl { color: var(--sub); }
.intel-val { font-family: var(--mono); font-weight: 700; }
.intel-val.pos { color: var(--green); }
.intel-val.neg { color: var(--red); }
.intel-val.neu { color: var(--sub); }
.locked { filter: blur(4px); user-select: none; color: var(--muted); }

/* PROB BAR */
.prob-bar-wrap { margin: 10px 0 0; }
.prob-labels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; margin-bottom: 4px; }
.prob-lbl-yes { color: var(--green); }
.prob-lbl-no { color: var(--red); }
.prob-bar { height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; display: flex; }
.prob-yes-fill { background: var(--green); border-radius: 3px 0 0 3px; height: 100%; transition: width 0.4s; }
.prob-no-fill { background: var(--red); border-radius: 0 3px 3px 0; height: 100%; flex: 1; }
.prob-pcts { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; font-weight: 700; margin-top: 4px; }
.pct-yes { color: var(--green); }
.pct-no { color: var(--red); }

/* ── AGENT CARDS ── */
.agent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.agent-card {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  display: flex; flex-direction: column; gap: 4px;
}
.agent-card:hover { border-color: var(--border2); }
.agent-card.hired { border-color: var(--gold); background: #181400; }
.agent-card.cant { opacity: 0.45; cursor: not-allowed; }
.ag-icon { font-size: 22px; }
.ag-name { font-family: var(--cond); font-size: 14px; font-weight: 800; color: #fff; }
.ag-cost { font-family: var(--mono); font-size: 11px; color: var(--gold); }
.ag-status { font-family: var(--mono); font-size: 10px; color: var(--green); }
.ag-desc { font-size: 11px; color: var(--sub); line-height: 1.4; }

/* ── OPERATION ── */
.op-item {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 14px; cursor: pointer;
  margin-bottom: 8px; transition: border-color 0.2s, background 0.2s;
}
.op-item:hover { border-color: var(--border2); }
.op-item.sel { border-color: var(--red); background: #180a10; }
.op-item.locked { opacity: 0.35; cursor: not-allowed; }
.op-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.op-name { font-family: var(--cond); font-size: 15px; font-weight: 800; color: #fff; }
.op-transp { font-family: var(--mono); font-size: 10px; color: var(--red); }
.op-desc { font-size: 12px; color: var(--sub); }
.op-match-row { display: flex; gap: 8px; margin-top: 10px; }
.op-match-btn {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 6px; text-align: center;
  font-family: var(--cond); font-size: 13px; font-weight: 700; cursor: pointer;
  color: var(--sub); transition: border-color 0.2s, color 0.2s;
}
.op-match-btn:hover, .op-match-btn.sel { border-color: var(--red); color: #fff; }

/* ── MARKET BET ── */
.market-match { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.bet-options { display: flex; gap: 8px; margin: 12px 0 10px; }
.bet-opt {
  flex: 1; background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; text-align: center;
}
.bet-opt.yes-opt { border-left: 3px solid var(--green); }
.bet-opt.no-opt { border-left: 3px solid var(--red); }
.bet-opt-label { font-family: var(--mono); font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.1em; }
.bet-opt-odds { font-family: var(--mono); font-size: 22px; font-weight: 700; margin: 4px 0 2px; }
.bet-opt-odds.yes { color: var(--green); }
.bet-opt-odds.no { color: var(--red); }
.bet-opt-pct { font-size: 10px; color: var(--sub); }
.amount-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.amount-inp {
  flex: 1; background: var(--card2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 12px; color: #fff;
  font-size: 18px; font-weight: 700; font-family: var(--mono);
  outline: none;
}
.amount-inp:focus { border-color: var(--gold); }
.amount-inp::placeholder { color: var(--muted); font-size: 14px; }
.presets { display: flex; gap: 6px; margin-bottom: 10px; }
.preset-btn {
  flex: 1; background: var(--card2); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 4px; font-family: var(--mono);
  font-size: 11px; color: var(--sub); cursor: pointer;
}
.preset-btn:hover { color: var(--gold); border-color: var(--gold); }
.bet-btns { display: flex; gap: 8px; }
.bet-placed-info {
  background: #0a1a10; border: 1px solid var(--green);
  border-radius: 8px; padding: 9px 12px; margin-top: 8px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px;
}
.bpi-left { color: var(--green); font-family: var(--cond); font-size: 14px; font-weight: 800; }
.bpi-right { font-family: var(--mono); color: var(--sub); }

/* ── RESULTS ── */
.result-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; margin-bottom: 10px; text-align: center;
}
.result-teams { font-family: var(--cond); font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 8px; }
.result-score { font-family: var(--mono); font-size: 36px; font-weight: 700; color: #fff; margin: 6px 0; }
.result-badge {
  display: inline-block; padding: 4px 16px; border-radius: 20px;
  font-family: var(--cond); font-size: 13px; font-weight: 800; letter-spacing: 0.05em;
}
.rb-yes { background: #0a1e12; color: var(--green); border: 1px solid var(--green); }
.rb-no { background: #1e0a0e; color: var(--red); border: 1px solid var(--red); }
.result-coins { font-family: var(--mono); font-size: 22px; font-weight: 700; margin-top: 10px; }
.result-coins.win { color: var(--green); }
.result-coins.loss { color: var(--red); }
.result-coins.neutral { color: var(--sub); }

/* ── LOG ROWS ── */
.log-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.log-row:last-child { border-bottom: none; }
.log-lbl { color: var(--sub); }
.log-val { font-family: var(--mono); font-weight: 700; }
.pos { color: var(--green); }
.neg { color: var(--red); }
.neu { color: var(--sub); }

/* ── LEAGUE TABLE ── */
.league-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.league-table th { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 6px 6px; text-align: center; border-bottom: 1px solid var(--border); }
.league-table th:first-child { text-align: left; }
.league-table td { padding: 9px 6px; text-align: center; color: var(--sub); border-bottom: 1px solid var(--border); }
.league-table td:first-child { text-align: left; color: var(--text); font-family: var(--cond); font-size: 14px; font-weight: 700; }
.league-table tr:last-child td { border-bottom: none; }
.pts-cell { font-family: var(--mono); font-weight: 700; color: #fff; }
.pos-cell { font-family: var(--mono); color: var(--muted); width: 20px; }
.leader td { background: #140e00; }

/* ── WARNING BOX ── */
.warning-box {
  background: #1a0810; border: 1px solid var(--red);
  border-radius: 10px; padding: 14px; margin-bottom: 12px; text-align: center;
}
.warn-icon { font-size: 28px; margin-bottom: 6px; }
.warn-title { font-family: var(--cond); font-size: 17px; font-weight: 800; color: var(--red); margin-bottom: 4px; }
.warn-desc { font-size: 12px; color: var(--sub); line-height: 1.5; }

/* ── GAME OVER ── */
.go-rank { font-family: var(--cond); font-size: 100px; font-weight: 900; text-align: center; line-height: 1; margin: 20px 0 8px; }
.go-title { font-family: var(--cond); font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.go-coins { font-family: var(--mono); font-size: 42px; font-weight: 700; color: var(--gold); text-align: center; margin: 12px 0; }
.go-sub { font-size: 12px; color: var(--sub); text-align: center; margin-bottom: 24px; }

/* ── BADGES ── */
.badge { display: inline-block; padding: 3px 9px; border-radius: 4px; font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.06em; }
.badge-red { background: #2a0810; color: var(--red); border: 1px solid #3a1020; }
.badge-gold { background: #1a1000; color: var(--gold); border: 1px solid #2a1a00; }
.badge-green { background: #0a1810; color: var(--green); border: 1px solid #102810; }
.badge-blue { background: #0a1020; color: var(--blue); border: 1px solid #101830; }
.badge-muted { background: var(--card2); color: var(--sub); border: 1px solid var(--border); }

/* ── PHASE STEPS ── */
.phase-steps { display: flex; gap: 0; margin-bottom: 14px; }
.phase-step { flex: 1; height: 3px; background: var(--border2); margin-right: 2px; border-radius: 2px; }
.phase-step:last-child { margin-right: 0; }
.phase-step.done { background: var(--green); }
.phase-step.active { background: var(--red); }

/* ── OP DONE BOX ── */
.op-done-box {
  background: #141000; border: 1px solid var(--gold);
  border-radius: 10px; padding: 12px; margin-bottom: 10px;
  font-size: 12px; color: var(--gold);
  display: flex; gap: 8px; align-items: flex-start;
}
.op-done-icon { font-size: 18px; flex-shrink: 0; }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { transform: scale(0.85); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.fade-in { animation: fadeIn 0.35s ease; }
.pop-in { animation: popIn 0.35s ease; }

/* ── BOTTOM SPACER ── */
.spacer { height: 20px; flex-shrink: 0; }

/* Scan line effect on logo */
.logo::after {
  content: '';
  display: block;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  margin-top: 4px;
  border-radius: 1px;
}

/* ── TABS ── */
.tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.tab-btn {
  flex: 1; padding: 8px; border-radius: 8px; background: var(--card2);
  border: 1px solid var(--border); font-family: var(--cond); font-size: 13px;
  font-weight: 700; color: var(--sub); cursor: pointer;
}
.tab-btn.active { background: var(--card); border-color: var(--border2); color: #fff; }
</style>
</head>
<body>
<div id="root">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="tb-left">
      <div class="tb-day" id="tb-day">GÜN 1 / 5</div>
      <div class="tb-phase" id="tb-phase">İSTİHBARAT</div>
    </div>
    <div class="tb-right">
      <div class="tb-transp">
        <div class="tb-transp-label">ŞEFFAFLIK</div>
        <div class="tb-bar"><div class="tb-bar-fill" id="tb-transp-fill" style="width:0%"></div></div>
      </div>
      <div class="tb-coins" id="tb-coins">₺400</div>
    </div>
  </div>

  <!-- Dynamic content goes here -->
  <div id="screen-container" class="page"></div>
</div>

<script>
'use strict';

/* ═══════════════════ CONSTANTS ═══════════════════ */
const TEAMS = {
  GS:  { name: 'Galatasaray',  short: 'GS',  icon: '⭐', color: '#e8a020' },
  FB:  { name: 'Fenerbahçe',   short: 'FB',  icon: '🦅', color: '#ffd200' },
  BJK: { name: 'Beşiktaş',     short: 'BJK', icon: '⚫', color: '#cccccc' },
  TS:  { name: 'Trabzonspor',  short: 'TS',  icon: '🔵', color: '#8b2020' },
};

const SCHEDULE = [
  [['GS','FB'],  ['BJK','TS']],
  [['GS','BJK'], ['FB','TS']],
  [['GS','TS'],  ['FB','BJK']],
  [['FB','GS'],  ['TS','BJK']],
  [['BJK','GS'], ['TS','FB']],
];

const AGENTS = {
  ref: { name:'Hakem',          icon:'⚖️',  cost:40, desc:'Hakem satın alma operasyonunu açar. Güç analizini gizli gösterir.', op:'ref_buy' },
  tra: { name:'Transfer Ajanı', icon:'💼',  cost:30, desc:'Oyuncu sabotaj operasyonunu açar. Forma bilgisi verir.', op:'player_sab' },
  jou: { name:'Gazeteci',       icon:'📰',  cost:20, desc:'Basın sızıntısı operasyonunu açar. Takım morali gösterir.', op:'press_leak' },
  sco: { name:'Gol Ajanı',      icon:'⚽',  cost:50, desc:'Skorer manipülasyonu açar. Detaylı maç analizi verir.', op:'goal_fix' },
};

const OPS = {
  ref_buy:    { name:'Hakem Satın Al',   icon:'⚖️',  transpCost:0.12, desc:'Hakemi satın al. Ev sahibi avantajı +8 puan.', effect:'home_boost', val:8 },
  player_sab: { name:'Oyuncu Sabotaj',   icon:'💊',  transpCost:0.10, desc:'Deplasman yıldızını devre dışı bırak. Güç −7.', effect:'away_nerf', val:7 },
  press_leak: { name:'Basın Sızıntısı',  icon:'📰',  transpCost:0.06, desc:'Medyaya yanlış bilgi sızdır. NO odds +15%.', effect:'odds_shift', val:0.15 },
  goal_fix:   { name:'Skor Sabitleme',   icon:'🎯',  transpCost:0.15, desc:'Sonucu doğrudan etkile. Ev sahibi +15 puan.', effect:'home_boost', val:15 },

const DIFF = {
  rookie:    { label:'Acemi',     icon:'🌱', coins:600, scandMult:0.5,  transpWarn:0.35, desc:'Başlangıç: 600₺ · Şeffaflık limiti: %35 · Ceza ×0.5' },
  fixer:     { label:'Fixer',     icon:'🔧', coins:400, scandMult:1.0,  transpWarn:0.42, desc:'Başlangıç: 400₺ · Şeffaflık limiti: %42 · Ceza ×1.0' },
  godfather: { label:'Godfather', icon:'💀', coins:200, scandMult:2.0,  transpWarn:0.50, desc:'Başlangıç: 200₺ · Şeffaflık limiti: %50 · Ceza ×2.0' },
};

const RANKS = [
  { min:900, rank:'S', label:'El Patron',        color:'#ffd700' },
  { min:700, rank:'A', label:'Syndicate Üyesi',  color:'#e8a020' },
  { min:500, rank:'B', label:'Sıradan Fixer',    color:'#8090a0' },
  { min:0,   rank:'F', label:'Tükenmişlik',       color:'#e8304a' },
];

/* ═══════════════════ STATE ═══════════════════ */
let G = {};
let SCORES = JSON.parse(localStorage.getItem('illegal_scores') || '[]');

/* ═══════════════════ UTILS ═══════════════════ */
const $ = id => document.getElementById(id);
const rnd = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const rndF = (a, b) => Math.random() * (b - a) + a;
const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
const sigmoid = x => 1 / (1 + Math.exp(-x));
const fmtCoins = n => (n >= 0 ? '+' : '') + Math.round(n) + '₺';
const delay = ms => new Promise(r => setTimeout(r, ms));

function getHomeWinProb(homeId, awayId, opEffect = null) {
  const h = G.teams[homeId], a = G.teams[awayId];
  let diff = (h.power - a.power) + 3 + (h.form - a.form);
  if (opEffect && opEffect.type === 'home_boost') diff += opEffect.val;
  if (opEffect && opEffect.type === 'away_nerf') diff += opEffect.val; // nerf means bonus to home
  let prob = sigmoid(diff / 10);
  if (opEffect && opEffect.type === 'odds_shift') prob = clamp(prob - opEffect.val, 0.10, 0.90);
  return clamp(prob, 0.12, 0.88);
}

function getOdds(prob) {
  const margin = 0.05;
  return {
    yes: Math.max(1.05, (1 / prob) * (1 - margin)),
    no: Math.max(1.05, (1 / (1 - prob)) * (1 - margin))
  };
}

function getRank(coins) {
  for (const r of RANKS) if (coins >= r.min) return r;
  return RANKS[RANKS.length - 1];
}

/* ═══════════════════ INIT ═══════════════════ */
function initRun(name, difficulty) {
  const cfg = DIFF[difficulty];
  G = {
    name, difficulty, cfg,
    day: 1,
    coins: cfg.coins,
    transparency: 0,
    warnings: 0,
    scandals: 0,
    
    teams: {},
    
    // Today's state
    phase: 'intel',
    todayMatches: [],
    hiredAgents: new Set(),
    opDone: false,
    opResult: null,
    bets: [null, null],
    dayExpense: 0,
    
    resultLog: [],
  };

  // Initialize teams
  for (const id of Object.keys(TEAMS)) {
    G.teams[id] = {
      power: rnd(62, 82),
      form: rnd(-4, 4),
      wins: 0, draws: 0, losses: 0,
      gf: 0, ga: 0, points: 0,
    };
  }

  setupDay();
  renderGame();
}

function setupDay() {
  const sched = SCHEDULE[G.day - 1];
  G.todayMatches = sched.map(([h, a]) => {
    const prob = getHomeWinProb(h, a);
    return {
      homeId: h, awayId: a,
      prob, // YES = home wins
      opEffect: null,
      result: null,
    };
  });
  G.hiredAgents = new Set();
  G.opDone = false;
  G.opResult = null;
  G.bets = [null, null];
  G.dayExpense = rnd(80, 120);
  G.phase = 'intel';
}

/* ═══════════════════ ACTIONS ═══════════════════ */
function hireAgent(agentId) {
  const ag = AGENTS[agentId];
  if (G.hiredAgents.has(agentId)) return;
  if (G.coins < ag.cost) return;
  G.coins -= ag.cost;
  G.hiredAgents.add(agentId);
  updateTopBar();
  renderPhase();
}

function doOperation(opType, matchIdx) {
  if (G.opDone) return;
  const op = OPS[opType];
  G.opDone = true;
  G.transparency = clamp(G.transparency + op.transpCost * G.cfg.scandMult, 0, 1);
  
  const match = G.todayMatches[matchIdx];
  match.opEffect = { type: op.effect, val: op.val };
  // Recalculate prob with op effect
  match.prob = getHomeWinProb(match.homeId, match.awayId, match.opEffect);
  
  G.opResult = { opType, matchIdx, opName: op.name };
  
  checkScandalWarning();
  goToPhase('market');
}

function skipOperation() {
  goToPhase('market');
}

function placeBet(matchIdx, side, amount) {
  if (G.bets[matchIdx]) return;
  const match = G.todayMatches[matchIdx];
  const odds = getOdds(match.prob);
  const chosenOdds = side === 'YES' ? odds.yes : odds.no;
  
  // AMM effect: shift prob slightly on bet
  if (side === 'YES') {
    match.prob = clamp(match.prob + amount * 0.0003, 0.10, 0.90);
  } else {
    match.prob = clamp(match.prob - amount * 0.0003, 0.10, 0.90);
  }
  
  G.bets[matchIdx] = { side, amount, odds: chosenOdds };
  G.coins -= amount;
  updateTopBar();
  renderPhase();
}

function resolveDay() {
  G.phase = 'result';
  G.resultLog = [];
  
  // Daily expense
  G.coins -= G.dayExpense;
  G.resultLog.push({ label: 'Günlük Yasal Masraf', val: -G.dayExpense });
  
  // Simulate matches
  for (let i = 0; i < G.todayMatches.length; i++) {
    const m = G.todayMatches[i];
    const result = simulateMatch(m);
    m.result = result;
    
    // Update league
    updateLeague(m.homeId, m.awayId, result.homeGoals, result.awayGoals);
    
    // Resolve bet
    const bet = G.bets[i];
    if (bet) {
      const won = bet.side === result.outcome;
      if (won) {
        const payout = Math.floor(bet.amount * bet.odds);
        G.coins += payout;
        G.resultLog.push({ label: `Bahis #${i+1} (${bet.side}) KAZANDI`, val: payout - bet.amount });
      } else {
        G.resultLog.push({ label: `Bahis #${i+1} (${bet.side}) KAYBETTİ`, val: -bet.amount });
      }
    }
  }
  
  // Scandal check
  if (G.transparency >= G.cfg.transpWarn) {
    const penalty = Math.floor(150 * G.cfg.scandMult);
    G.coins -= penalty;
    G.scandals++;
    G.resultLog.push({ label: '⚠️ Skandal Cezası!', val: -penalty });
    G.transparency = clamp(G.transparency - 0.15, 0, 1); // reduce after penalty
  }
  
  G.coins = Math.max(0, G.coins);
  
  updateTopBar();
  renderPhase();
}

function simulateMatch(m) {
  const h = G.teams[m.homeId], a = G.teams[m.awayId];
  let diff = (h.power - a.power) + 3 + (h.form - a.form);
  
  if (m.opEffect) {
    if (m.opEffect.type === 'home_boost') diff += m.opEffect.val;
    if (m.opEffect.type === 'away_nerf') diff += m.opEffect.val;
  }
  
  const noise = rndF(-10, 10);
  const final = diff + noise;
  
  let homeGoals, awayGoals;
  if (final > 5) {
    homeGoals = rnd(2, 4); awayGoals = rnd(0, homeGoals - 1);
  } else if (final > 1.5) {
    homeGoals = rnd(1, 3); awayGoals = rnd(0, Math.max(0, homeGoals - 1));
    if (awayGoals >= homeGoals) awayGoals = homeGoals - 1;
  } else if (final < -5) {
    awayGoals = rnd(2, 4); homeGoals = rnd(0, awayGoals - 1);
  } else if (final < -1.5) {
    awayGoals = rnd(1, 3); homeGoals = rnd(0, Math.max(0, awayGoals - 1));
    if (homeGoals >= awayGoals) homeGoals = awayGoals - 1;
  } else {
    const base = rnd(0, 2);
    homeGoals = base; awayGoals = base;
  }
  
  const result = homeGoals > awayGoals ? 'HOME' : homeGoals < awayGoals ? 'AWAY' : 'DRAW';
  const outcome = result === 'HOME' ? 'YES' : 'NO';
  return { homeGoals, awayGoals, result, outcome };
}

function updateLeague(homeId, awayId, hg, ag) {
  const h = G.teams[homeId], a = G.teams[awayId];
  h.gf += hg; h.ga += ag; h.played = (h.played||0)+1;
  a.gf += ag; a.ga += hg; a.played = (a.played||0)+1;
  if (hg > ag) { h.wins++; h.points += 3; a.losses = (a.losses||0)+1; }
  else if (ag > hg) { a.wins++; a.points += 3; h.losses = (h.losses||0)+1; }
  else { h.draws++; h.points++; a.draws++; a.points++; }
}

function nextDay() {
  if (G.day >= 5) {
    endGame();
    return;
  }
  G.day++;
  setupDay();
  renderGame();
}

function endGame() {
  const rank = getRank(G.coins);
  SCORES.push({ coins: G.coins, rank: rank.rank, name: G.name, diff: G.difficulty });
  SCORES.sort((a, b) => b.coins - a.coins);
  SCORES = SCORES.slice(0, 10);
  localStorage.setItem('illegal_scores', JSON.stringify(SCORES));
  
  showGameOver();
}

        <span class="badge badge-muted">AÇIK</span>
      </div>
      <div class="prob-bar-wrap">
        <div class="prob-labels">
          <span class="prob-lbl-yes">YES · ${pctYes}%</span>
          <span class="prob-lbl-no">NO · ${pctNo}%</span>
        </div>
        <div class="prob-bar">
          <div class="prob-yes-fill" style="width:${pctYes}%"></div>
          <div class="prob-no-fill"></div>
        </div>
        <div class="prob-pcts">
          <span class="pct-yes">${odds.yes.toFixed(2)}x</span>
          <span class="pct-no">${odds.no.toFixed(2)}x</span>
        </div>
      </div>
      <div class="bet-options">
        <div class="bet-opt yes-opt">
          <div class="bet-opt-label">YES · ${h.short} KAZANIR</div>
          <div class="bet-opt-odds yes">${odds.yes.toFixed(2)}x</div>
          <div class="bet-opt-pct">${pctYes}% olasılık</div>
        </div>
        <div class="bet-opt no-opt">
          <div class="bet-opt-label">NO · KAZANMAZ</div>
          <div class="bet-opt-odds no">${odds.no.toFixed(2)}x</div>
          <div class="bet-opt-pct">${pctNo}% olasılık</div>
        </div>
      </div>
      <div style="font-family:var(--mono); font-size:10px; color:var(--muted); margin-bottom:6px">MAX: ${maxBet}₺ (bakiyenin %40)</div>
      <div class="amount-row">
        <input class="amount-inp" id="amt-${i}" type="number" placeholder="Miktar gir..." min="10" max="${maxBet}" step="10">
      </div>
      <div class="presets">
        ${[25, 50, 75, 100].map(pct => {
          const v = Math.max(10, Math.floor(maxBet * pct / 100));
          return `<div class="preset-btn" onclick="setAmount(${i},${v})">${pct}%</div>`;
        }).join('')}
      </div>
      <div class="bet-btns">
        <button class="btn btn-sm" style="flex:1; background:linear-gradient(135deg,#0a2018,#22c45e); color:#fff; border:1px solid #22c45e;" 
          onclick="betFromInput(${i},'YES')">✅ YES'e Bahset</button>
        <button class="btn btn-sm" style="flex:1; background:linear-gradient(135deg,#200a10,#e8304a); color:#fff; border:1px solid #e8304a;" 
          onclick="betFromInput(${i},'NO')">❌ NO'ya Bahset</button>
      </div>
    </div>`;
  }).join('');

  const betsPlaced = G.bets.filter(b => b !== null).length;

  return `
  <div class="phase-steps">
    <div class="phase-step done"></div>
    <div class="phase-step done"></div>
    <div class="phase-step active"></div>
    <div class="phase-step"></div>
  </div>
  <div class="ph-title">MARKET</div>
  <div class="ph-sub">YES = Ev sahibi kazanır · NO = Kazanmaz (beraberlik dahil)</div>
  ${matchCards}
  <div class="spacer"></div>
  <button class="btn btn-red" onclick="resolveDay()">
    SONUÇLARA GİT ${betsPlaced > 0 ? `(${betsPlaced} bahis)` : '(bahissiz)'} →
  </button>
  <div style="height:8px"></div>`;
}

function setAmount(matchIdx, val) {
  const inp = $(`amt-${matchIdx}`);
  if (inp) inp.value = val;
}

function betFromInput(matchIdx, side) {
  const inp = $(`amt-${matchIdx}`);
  if (!inp) return;
  const amount = parseInt(inp.value);
  if (!amount || amount < 10) { alert('En az 10₺ giriniz'); return; }
  const maxBet = Math.floor(G.coins * 0.40);
  if (amount > maxBet) { alert(`Maksimum bahis: ${maxBet}₺`); return; }
  if (amount > G.coins) { alert('Yetersiz bakiye'); return; }
  placeBet(matchIdx, side, amount);
}

/* ── RESULT PHASE ── */
function htmlResult() {
  const matchCards = G.todayMatches.map((m, i) => {
    if (!m.result) return '';
    const h = TEAMS[m.homeId], a = TEAMS[m.awayId];
    const r = m.result;
    const bet = G.bets[i];
    const won = bet && bet.side === r.outcome;
    const lost = bet && bet.side !== r.outcome;
    const payout = won ? Math.floor(bet.amount * bet.odds) : 0;
    
    return `
    <div class="result-card fade-in">
      <div class="result-teams">${h.short} vs ${a.short}</div>
      ${m.opResult || (G.opResult && G.opResult.matchIdx === i) ? `<div style="font-size:11px; color:var(--gold); margin-bottom:4px">⚡ Operasyon Uygulandı</div>` : ''}
      <div class="result-score">${r.homeGoals} – ${r.awayGoals}</div>
      <div style="margin-bottom:8px">
        <span class="result-badge ${r.outcome === 'YES' ? 'rb-yes' : 'rb-no'}">
          ${r.result === 'HOME' ? `${h.short} Kazandı · YES ✅` : r.result === 'AWAY' ? `${a.short} Kazandı · NO ❌` : `Beraberlik · NO ❌`}
        </span>
      </div>
      ${bet ? `
      <div class="result-coins ${won ? 'win' : 'loss'}">
        ${won ? `+${payout - bet.amount}₺` : `-${bet.amount}₺`}
        <span style="font-size:13px; color:var(--sub)"> (${bet.side} · ${bet.amount}₺ @ ${bet.odds.toFixed(2)}x)</span>
      </div>` : `<div style="font-size:12px; color:var(--muted)">Bu maça bahis yapılmadı</div>`}
    </div>`;
  }).join('');

  const logRows = G.resultLog.map(item => `
  <div class="log-row">
    <span class="log-lbl">${item.label}</span>
    <span class="log-val ${item.val > 0 ? 'pos' : item.val < 0 ? 'neg' : 'neu'}">${fmtCoins(item.val)}</span>
  </div>`).join('');

  const isLastDay = G.day >= 5;

  return `
  <div class="phase-steps">
    <div class="phase-step done"></div>
    <div class="phase-step done"></div>
    <div class="phase-step done"></div>
    <div class="phase-step active"></div>
  </div>
  <div class="ph-title">SONUÇLAR</div>
  <div class="ph-sub">Gün ${G.day} tamamlandı. Bakiye: <strong style="color:var(--gold)">₺${Math.round(G.coins)}</strong></div>

  ${G.scandals > 0 && G.resultLog.some(r => r.label.includes('Skandal')) ? `
  <div class="warning-box">
    <div class="warn-icon">🚨</div>
    <div class="warn-title">SKANDAL CEZASI!</div>
    <div class="warn-desc">Şeffaflık limiti aşıldı. Para cezası uygulandı ve kayıtlara geçildi.</div>
  </div>` : ''}

  ${matchCards}

  <div class="card">
    <div class="sec-title">GÜN ÖZETI</div>
    ${logRows}
    <div class="divider"></div>
    <div class="log-row" style="font-weight:700">
      <span class="log-lbl">Toplam Bakiye</span>
      <span class="log-val" style="color:var(--gold); font-size:15px">₺${Math.round(G.coins)}</span>
    </div>
  </div>

  <div id="league-tab-area">
    ${htmlLeagueTable()}
  </div>

  <div class="spacer"></div>
  <button class="btn ${isLastDay ? 'btn-gold' : 'btn-red'}" onclick="${isLastDay ? 'endGame()' : 'nextDay()'}">
    ${isLastDay ? '🏆 SEZON SONU' : `GÜN ${G.day + 1}'E GEÇ →`}
  </button>
  <div style="height:8px"></div>`;
}

function htmlLeagueTable() {
  const teamIds = Object.keys(TEAMS);
  const sorted = teamIds.slice().sort((a, b) => {
    const ta = G.teams[a], tb = G.teams[b];
    if (tb.points !== ta.points) return tb.points - ta.points;
    return (tb.gf - tb.ga) - (ta.gf - ta.ga);
  });

  return `
  <div class="card" style="margin-bottom:10px">
    <div class="sec-title">LİG TABLOSU</div>
    <table class="league-table">
      <tr>
        <th>#</th><th style="text-align:left">Takım</th><th>O</th><th>G</th><th>B</th><th>M</th><th>AG</th><th>P</th>
      </tr>
      ${sorted.map((id, i) => {
        const t = G.teams[id], tm = TEAMS[id];
        return `
        <tr ${i === 0 ? 'class="leader"' : ''}>
          <td class="pos-cell">${i+1}</td>
          <td>${tm.icon} ${tm.short}</td>
          <td>${t.played||0}</td>
          <td>${t.wins||0}</td>
          <td>${t.draws||0}</td>
          <td>${t.losses||0}</td>
          <td>${(t.gf||0)}:${(t.ga||0)}</td>
          <td class="pts-cell">${t.points||0}</td>
        </tr>`;
      }).join('')}
    </table>
  </div>`;
}

/* ── GAME OVER SCREEN ── */
function showGameOver() {
  $('topbar').classList.remove('visible');
  const container = $('screen-container');
  const rank = getRank(G.coins);
  const diff = DIFF[G.difficulty];
  
  // League final
  const teamIds = Object.keys(TEAMS);
  const champion = teamIds.slice().sort((a, b) => {
    const ta = G.teams[a], tb = G.teams[b];
    if (tb.points !== ta.points) return tb.points - ta.points;
    return (tb.gf - tb.ga) - (ta.gf - ta.ga);
  })[0];
  const champ = TEAMS[champion];

  container.innerHTML = `
  <div style="text-align:center; padding:32px 0 20px">
    <div style="font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.15em; margin-bottom:12px">SEZON TAMAMLANDI</div>
    <div class="go-rank" style="color:${rank.color}">${rank.rank}</div>
    <div class="go-title">${rank.label}</div>
    <div class="go-coins">₺${Math.round(G.coins)}</div>
    <div class="go-sub">${G.name} · ${diff.label} · ${G.scandals} skandal</div>
  </div>

  <div class="card">
    <div class="sec-title">SEZON ŞAMPIYONU</div>
    <div style="text-align:center; padding:12px">
      <div style="font-size:40px">${champ.icon}</div>
      <div style="font-family:var(--cond); font-size:22px; font-weight:900; color:#fff; margin-top:6px">${champ.name}</div>
    </div>
    ${htmlLeagueTable()}
  </div>

  <div class="card">
    <div class="sec-title">RUN İSTATİSTİKLERİ</div>
    <div class="log-row"><span class="log-lbl">Zorluk</span><span class="log-val neu">${diff.label}</span></div>
    <div class="log-row"><span class="log-lbl">Skandal Sayısı</span><span class="log-val ${G.scandals > 0 ? 'neg' : 'pos'}">${G.scandals}</span></div>
    <div class="log-row"><span class="log-lbl">Şeffaflık</span><span class="log-val ${G.transparency > 0.5 ? 'neg' : 'neu'}">${Math.round(G.transparency*100)}%</span></div>
    <div class="log-row"><span class="log-lbl">Final Bakiye</span><span class="log-val" style="color:var(--gold)">₺${Math.round(G.coins)}</span></div>
  </div>

  ${htmlBestScores()}

  <div class="spacer"></div>
  <button class="btn btn-red" onclick="showHome()">🔄 YENİ RUN</button>
  <div style="height:8px"></div>`;
}

/* ── HOME SCREEN ── */
function showHome() {
  $('topbar').classList.remove('visible');
  G = {};
  const container = $('screen-container');
  container.innerHTML = `
  <div class="hero">
    <div class="logo">illegal<span>football</span></div>
    <div class="logo-sub">tek oyunculu · şike · piyasa · kriz</div>
  </div>

  ${htmlBestScores()}

  <div class="spacer"></div>
  <button class="btn btn-red" onclick="showSetup()">YENİ RUN BAŞLAT →</button>
  <div style="height:8px"></div>`;
}

function htmlBestScores() {
  if (SCORES.length === 0) {
    return `<div class="card"><div class="no-scores">Henüz tamamlanmış run yok.</div></div>`;
  }
  return `
  <div class="card">
    <div class="sec-title">EN İYİ RUNLAR</div>
    ${SCORES.slice(0, 5).map((s, i) => {
      const r = getRank(s.coins);
      return `
      <div class="score-row">
        <span style="color:var(--muted); font-family:var(--mono); font-size:11px">#${i+1}</span>
        <span style="font-family:var(--cond); font-size:14px; font-weight:700">${s.name}</span>
        <span class="score-rank" style="color:${r.color}">${r.rank}</span>
        <span class="score-num">₺${s.coins}</span>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── SETUP SCREEN ── */
function showSetup() {
  $('topbar').classList.remove('visible');
  let selDiff = 'fixer';
  const container = $('screen-container');
  
  const renderSetup = () => {
    container.innerHTML = `
    <div class="setup-hero">
      <div class="logo" style="font-size:42px">illegal<span>football</span></div>
      <div class="logo-sub" style="margin-bottom:0">yönetici profili</div>
    </div>

    <div class="sec-title">YÖNETİCİ ADI</div>
    <input class="name-input" id="manager-name" placeholder="Adınızı girin..." maxlength="20" value="">

    <div class="sec-title">ZORLUK</div>
    ${Object.entries(DIFF).map(([id, d]) => `
    <div class="diff-btn ${id === selDiff ? 'sel' : ''}" id="diff-${id}" onclick="changeDiff('${id}')">
      <span class="diff-icon">${d.icon}</span>
      <div class="diff-info">
        <div class="diff-name">${d.label}</div>
        <div class="diff-desc">${d.desc}</div>
      </div>
    </div>`).join('')}

    <div style="margin-top:8px"></div>
    <button class="btn btn-gold" id="start-btn" onclick="startGame()">SEZONU BAŞLAT →</button>
    <div style="height:6px"></div>
    <button class="btn btn-ghost" onclick="showHome()">← Geri</button>
    <div style="height:8px"></div>`;
    
    window._selDiff = selDiff;
  };
  
  window.changeDiff = (id) => {
    selDiff = id;
    window._selDiff = id;
    document.querySelectorAll('.diff-btn').forEach(el => el.classList.remove('sel'));
    const el = $(`diff-${id}`);
    if (el) el.classList.add('sel');
  };
  
  window.startGame = () => {
    const nameEl = $('manager-name');
    const name = nameEl ? nameEl.value.trim() : '';
    if (!name) { nameEl.focus(); nameEl.style.borderColor = 'var(--red)'; return; }
    initRun(name, window._selDiff || 'fixer');
  };
  
  renderSetup();
}

/* ═══════════════════ ENTRY ═══════════════════ */
showHome();
</script>
</body>
</html>
